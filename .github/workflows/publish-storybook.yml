name: Publish design system

# Auto-publishes Storybook (the design system) to its own Vercel project
# — https://design.denisibanez.dev — on every push to main. The main app is
# deployed separately by Vercel's Git integration; this is a distinct project.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.storybook/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/publish-storybook.yml'
  workflow_dispatch:

jobs:
  storybook:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      # Deploy the prebuilt static folder (no vercel.json there, so the app's
      # SPA rewrite doesn't apply) to the design-system project.
      - name: Deploy to Vercel
        working-directory: storybook-static
        run: pnpm dlx vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
