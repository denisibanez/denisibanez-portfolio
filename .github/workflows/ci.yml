name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Unit + visual tests (Vitest jsdom + Storybook browser)
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build-only

      - name: E2E (Playwright)
        run: pnpm test:e2e
